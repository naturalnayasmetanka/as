events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # В dev на localhost браузер часто тащит cookies от других локальных проектов.
    # Без увеличенных буферов nginx может отвечать 400 "Request Header Or Cookie Too Large"
    # ещё до проксирования в frontend/auth-service.
    client_header_buffer_size 32k;
    large_client_header_buffers 8 128k;

    # DNS-резолвер для имён контейнеров (auth-service, frontend и т.д.).
    # 127.0.0.11 — встроенный Docker DNS внутри пользовательской сети.
    # Нужен потому, что в proxy_pass ниже мы используем переменные ($upstream_*),
    # а с переменными nginx резолвит имена в рантайме, а не один раз при старте.
    # Без этой строки nginx упадёт с "host not found" при первой же попытке.
    resolver 127.0.0.11 valid=10s ipv6=off;

    server {
        listen 80;
        server_name localhost;

        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # ----------------------------------------------------------------------
        # /api/* → AuthService
        # Срабатывает на любой URL, начинающийся с /api/ (например /api/users).
        # ----------------------------------------------------------------------
        location /api/ {
            # Кладём адрес бэкенда в переменную. Сам по себе set ничего не проксирует —
            # он нужен, чтобы proxy_pass ниже использовал переменную, а не статический URL.
            # Зачем: со статическим URL nginx резолвит auth-service в IP один раз при старте.
            # Если контейнер пересоздадут — получим 502, пока не перезапустим nginx.
            # С переменной + resolver выше DNS пересматривается на каждый запрос.
            set $upstream_auth http://as.backend:7218;

            # Срезаем префикс /api/ из URI: /api/users -> /users.
            # У AuthService роуты без префикса (MapPost("/users", ...)).
            #
            # Флаг break: «не запускай поиск location заново для нового URI, оставайся здесь».
            # Без break nginx после rewrite попытался бы заново сматчить /users — и попал бы
            # в location / (фронт), запрос ушёл бы не туда.
            #
            # Альтернатива rewrite — статический proxy_pass со слешем:
            #     proxy_pass http://auth-service:8001/;
            # тогда nginx сам подменяет /api/ на /. Но мы используем переменную (см. выше),
            # а с переменной авто-подмены URI нет — поэтому rewrite обязателен.
            rewrite ^/api/(.*) /$1 break;

            # Отправляем запрос на $upstream_auth (= http://auth-service:8001).
            # К нему дописывается уже переписанный URI (/users), итог: http://auth-service:8001/users.
            proxy_pass $upstream_auth;

            # Пробрасываем оригинальный заголовок Host (например, localhost).
            # По умолчанию nginx подставит туда auth-service:8001 — что плохо,
            # ASP.NET может строить redirect-ссылки по Host.
            proxy_set_header Host $host;

            # IP клиента, который пришёл к nginx, — иначе бэкенд видит только IP nginx-контейнера.
            proxy_set_header X-Real-IP $remote_addr;

            # Стандартная цепочка прокси. $proxy_add_x_forwarded_for дописывает IP в конец
            # уже существующего X-Forwarded-For (если запрос идёт через несколько прокси),
            # а не затирает его.
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # Схема оригинального запроса (http/https). Когда снаружи https, а внутри между
            # nginx и бэком http — бэкенд по этому заголовку понимает реальный scheme и
            # корректно строит абсолютные URL / cookie с Secure-флагом.
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Prefix /api;
        }

        # ----------------------------------------------------------------------
        # / — всё остальное → Next.js (frontend).
        # Catch-all: ловит любой URL, который не попал в более специфичный location выше.
        # nginx выбирает location по самому длинному совпадающему префиксу,
        # поэтому /api/users уходит в /api/, а /about — сюда.
        # ----------------------------------------------------------------------
        location / {
            # Та же история с переменной — динамический DNS-резолв контейнера frontend.
            set $upstream_frontend http://as.frontend:3000;

            # Здесь rewrite НЕ нужен: Next.js должен получить URL как есть
            # (/about должен остаться /about, иначе роутинг сломается).
            proxy_pass $upstream_frontend;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # Frontend сейчас не использует cookies; не тащим во frontend
            # большие localhost-cookie от других локальных проектов.
            proxy_set_header Cookie "";

            # WebSocket support (нужен для HMR в dev и RSC streaming в prod).
            # По умолчанию nginx общается с upstream по HTTP/1.0, где апгрейда до WebSocket нет.
            proxy_http_version 1.1;

            # Хедеры Upgrade / Connection — это рукопожатие WebSocket.
            # nginx по умолчанию НЕ пробрасывает Connection (считает hop-by-hop),
            # поэтому без этих двух строк сервер никогда не увидит апгрейд.
            # $http_upgrade — встроенная переменная со значением заголовка Upgrade
            # из запроса клиента. Если клиент его не слал — переменная пустая,
            # и Connection: upgrade уходит вхолостую (это безопасно).
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}