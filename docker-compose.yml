services:
  as.backend:
    container_name: as.backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "7218:7218"
    env_file:
      - .env
    environment:
      - ASPNETCORE_ENVIRONMENT=Docker
      - ASPNETCORE_HTTP_PORTS=${AS_PORT}
      - ConnectionStrings__Db=${DB_CONNECTION_INTERNAL}
    depends_on:
      postgres:
        condition: service_healthy
      as.backend.migrations:
        condition: service_completed_successfully
    restart: always
 
  as.backend.migrations:
    container_name: as.backend.migrations
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: migrations-final
    environment:
      - ASPNETCORE_ENVIRONMENT=Docker
      - ConnectionStrings__Db=${DB_CONNECTION_INTERNAL}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  as.projects:
    container_name: as.projects
    build:
      context: ./backend
      dockerfile: Dockerfile.projects
    ports:
      - "7220:7220"
    env_file:
      - .env
    environment:
      - ASPNETCORE_ENVIRONMENT=Docker
      - ASPNETCORE_HTTP_PORTS=${PROJECTS_PORT}
      - ConnectionStrings__Db=${DB_CONNECTION_INTERNAL}
    depends_on:
      postgres:
        condition: service_healthy
      as.projects.migrations:
        condition: service_completed_successfully
    restart: always

  as.projects.migrations:
    container_name: as.projects.migrations
    build:
      context: ./backend
      dockerfile: Dockerfile.projects
      target: migrations-final
    env_file:
      - .env
    environment:
      - ASPNETCORE_ENVIRONMENT=Docker
      - ConnectionStrings__Db=${DB_CONNECTION_INTERNAL}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
 
  as.frontend:
    container_name: as.frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
        - NEXT_PUBLIC_PROJECTS_API_URL=${NEXT_PUBLIC_PROJECTS_API_URL}
    ports:
      - "3000:3000"
    env_file:
      - ./frontend/.env
    restart: always
 
  postgres:
    container_name: as.postgres
    image: postgres:16
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5454:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10
 
  nginx:
    container_name: as.nginx
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - as.backend
      - as.projects
      - as.frontend
    restart: always
 
volumes:
  postgres-data:
